name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.x

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: 3.11

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: flet build apk --project "Controle Financas" --org "com.github.tshonorio" --build-version "1.0.0"

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: controle-financas-apk
          path: build/apk/
